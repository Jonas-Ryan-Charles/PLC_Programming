# Render blueprint for the VoltRung backend (Express + libSQL/Turso).
#
# Deploy: https://dashboard.render.com → New → Blueprint → connect this repo.
# After it goes live, copy the service URL (e.g. https://voltrung-api.onrender.com)
# and set it as VITE_API_BASE in the Vercel project, then redeploy the frontend.
#
# PERSISTENCE: the backend uses Turso (libSQL) so account/progress data survives
# restarts and redeploys even on Render's free plan. Set TURSO_DATABASE_URL and
# TURSO_AUTH_TOKEN in the Render dashboard (they are sync:false = not in the repo).
# Without them the server falls back to a local (ephemeral) SQLite file.
# Note: the free plan still sleeps after ~15 min idle (~50 s cold start on the
# first request) — but data is no longer lost.
services:
  - type: web
    name: voltrung-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: VOLTRUNG_JWT_SECRET
        generateValue: true
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
